{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ if .Content }}
<div class="section-content" style="margin-bottom: 40px;">
  {{ .Content }}
</div>
{{ end }}

<ul class="post-list">
  {{ range .Pages }}
    <li class="post-item">
      <span class="post-date">{{ .Date.Format "Jan 02, 2006" }}</span>
      <span class="post-title">
        <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      </span>
    </li>
  {{ end }}
</ul>
{{ end }}
